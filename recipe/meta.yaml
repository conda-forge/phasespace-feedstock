{% set name = "phasespace" %}
{% set version = "1.10.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/zfit/phasespace/archive/{{ version }}.tar.gz
  sha256: 12fa7693ec757a337f1adb05d2165152f2cdf5e76fc636e508e9741a6adea359

build:
  number: 0
  script: '{{ PYTHON }} -m pip install . -vv '
  noarch: python

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools_scm
    - setuptools_scm_git_archive
    - setuptools
  run:
    - python >={{ python_min }}
    - tensorflow >=2.15
    - tensorflow-probability >=0.23
    - particle
    - decaylanguage
    - vector

test:
  requires:
    - python {{ python_min }}
  imports:
    - phasespace
    - phasespace.kinematics
    - phasespace.phasespace
    - phasespace.random

about:
  home: https://github.com/zfit/phasespace
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Phase space generation implemented in TensorFlow
  doc_url: https://phasespace.readthedocs.io
  dev_url: https://github.com/zfit/phasespace

extra:
  recipe-maintainers:
    - chrisburr
    - jonas-eschle
